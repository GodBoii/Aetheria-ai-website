name: CodeRabbit AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Allow manual trigger for full repository reviews
  workflow_dispatch:

jobs:
  coderabbit-review:
    runs-on: ubuntu-latest
    name: CodeRabbit AI Code Review
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history for better analysis
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          # Install Python dependencies for analysis
          pip install flake8 black isort mypy
          # Install Node.js dependencies for analysis
          npm install -g eslint jshint
          
      - name: Run CodeRabbit Review
        run: |
          # This step would trigger CodeRabbit's analysis
          # CodeRabbit will automatically pick up the .coderabbitrc.yaml config
          echo "CodeRabbit review triggered"
          echo "Configuration: .coderabbitrc.yaml"
          echo "Review scope: Full repository analysis"
          
      - name: Comment PR with review trigger
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;
            
            // Add comment to trigger full CodeRabbit review
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: '@coderabbitai full review\n\nThis PR has been automatically configured for comprehensive codebase analysis using the .coderabbitrc.yaml configuration file.'
            });
