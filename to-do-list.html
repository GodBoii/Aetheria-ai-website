<!-- Task Manager — Full-Screen Takeover -->
<div id="to-do-list-container" class="task-fullscreen-container hidden">
  <!-- Header -->
  <div class="task-panel-header">
    <div class="task-panel-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="6" height="6" rx="1" />
        <path d="m3 17 2 2 4-4" />
        <path d="M13 6h8" />
        <path d="M13 12h8" />
        <path d="M13 18h8" />
      </svg>
      <h2>Tasks</h2>
    </div>
    <button class="task-panel-close-btn" aria-label="Close Tasks">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
  </div>

  <!-- Task Card Grid -->
  <div class="task-grid-container">
    <div id="task-grid" class="task-grid">
      <!-- Cards rendered by JS -->
    </div>
    <!-- Empty State -->
    <div id="task-empty-state" class="task-empty-state hidden">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="6" height="6" rx="1" />
        <path d="m3 17 2 2 4-4" />
        <path d="M13 6h8" />
        <path d="M13 12h8" />
        <path d="M13 18h8" />
      </svg>
      <p>No tasks yet</p>
      <span>Create a task and AI will handle it for you</span>
    </div>
  </div>

  <!-- FAB Add Button -->
  <button id="add-task-fab" class="task-fab" aria-label="Add Task">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14" />
      <path d="M12 5v14" />
    </svg>
  </button>
</div>

<!-- Enhanced Task Creation Modal -->
<div id="new-task-modal" class="modal-overlay hidden">
  <div class="modal task-create-modal">
    <div class="modal-header">
      <h3>New Task</h3>
    </div>
    <div class="modal-content">
      <div class="form-group">
        <label for="task-name">Task Name</label>
        <input type="text" id="task-name" placeholder="What should AI do?" required>
      </div>
      <div class="form-group">
        <label for="task-description">Description</label>
        <textarea id="task-description" placeholder="Add details about this task..."></textarea>
      </div>

      <!-- Schedule Section -->
      <div class="form-section-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        Schedule
      </div>
      <div class="form-row">
        <div class="form-group form-group-half">
          <label for="task-schedule-time">Run At</label>
          <input type="time" id="task-schedule-time">
        </div>
        <div class="form-group form-group-half">
          <label for="task-schedule-date">Start Date</label>
          <input type="date" id="task-schedule-date">
        </div>
      </div>
      <div class="form-group">
        <label for="task-repeat">Repeat</label>
        <select id="task-repeat">
          <option value="none">None</option>
          <option value="daily">Daily</option>
          <option value="weekdays">Weekdays (Mon–Fri)</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
          <option value="custom">Custom interval</option>
        </select>
      </div>
      <div id="custom-interval-group" class="form-row hidden">
        <div class="form-group form-group-half">
          <label for="task-custom-interval-value">Every</label>
          <input type="number" id="task-custom-interval-value" min="1" value="1">
        </div>
        <div class="form-group form-group-half">
          <label for="task-custom-interval-unit">Unit</label>
          <select id="task-custom-interval-unit">
            <option value="hours">Hours</option>
            <option value="days">Days</option>
            <option value="weeks">Weeks</option>
          </select>
        </div>
      </div>

      <!-- Tools Section -->
      <div class="form-section-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
        </svg>
        Tools
      </div>
      <div class="tool-chips-container" id="tool-chips">
        <label class="tool-chip">
          <input type="checkbox" name="task-tools" value="internet_search">
          <span>Web Search</span>
        </label>
        <label class="tool-chip">
          <input type="checkbox" name="task-tools" value="browser">
          <span>Server Browser</span>
        </label>
        <label class="tool-chip">
          <input type="checkbox" name="task-tools" value="email">
          <span>Email</span>
        </label>
        <label class="tool-chip">
          <input type="checkbox" name="task-tools" value="google_drive">
          <span>Google Drive</span>
        </label>
        <label class="tool-chip">
          <input type="checkbox" name="task-tools" value="google_sheets">
          <span>Google Sheets</span>
        </label>
        <label class="tool-chip">
          <input type="checkbox" name="task-tools" value="github">
          <span>GitHub</span>
        </label>
      </div>

      <!-- Custom Instructions -->
      <div class="form-group">
        <label for="task-instructions">Custom Instructions</label>
        <textarea id="task-instructions" placeholder="Guide AI behavior for this task..."></textarea>
      </div>

      <!-- Priority & Tags -->
      <div class="form-row">
        <div class="form-group form-group-half">
          <label for="task-priority">Priority</label>
          <select id="task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group form-group-half">
          <label for="task-tags">Tags</label>
          <input type="text" id="task-tags" placeholder="comma-separated">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-task-btn">Cancel</button>
      <button class="btn btn-primary" id="save-task-btn">Create Task</button>
    </div>
  </div>
</div>

<!-- Output Viewer Panel -->
<div id="task-output-backdrop" class="task-output-backdrop hidden"></div>
<div id="task-output-panel" class="task-output-panel hidden">
  <div class="task-output-header">
    <div class="task-output-title-row">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="task-output-icon">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
        <polyline points="10 9 9 9 8 9" />
      </svg>
      <h3 id="task-output-title">Task Output</h3>
    </div>
    <div class="task-output-actions">
      <button id="task-output-download" class="task-output-download-btn" title="Download as Markdown">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
      </button>
      <button id="task-output-close" class="task-output-close-btn" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </div>
  </div>
  <div class="task-output-meta" id="task-output-meta"></div>
  <div class="task-output-body">
    <div id="task-output-content" class="task-output-text markdown-body"></div>
  </div>
</div>

<!-- Task Detail Modal (Compact) -->
<div id="task-detail-modal" class="modal-overlay hidden">
  <div class="modal task-detail-modal-inner">
    <div class="modal-header">
      <h3 id="task-detail-title">Task Details</h3>
      <button class="task-detail-close-btn" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </div>
    <div class="modal-content" id="task-detail-body">
      <!-- Rendered by JS as rows -->
    </div>
  </div>
</div>
