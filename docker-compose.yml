# docker-compose.yml (Final Recommended Version)

version: '3.8'

services:
  redis:
    image: "redis:7.2-alpine"
    container_name: aios-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aios-web
    ports:
      - "8765:8765"
    env_file:
      - ./python-backend/.env
    volumes:
      - ./python-backend:/app
    depends_on:
      - redis
      - sandbox-manager
    deploy:
      resources:
        limits:
          memory: 3.5G  # Reserve 500MB for system
          cpus: '1.8'   # Leave some CPU for other containers
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aios-flower
    # The -A flag now targets the centralized Celery app defined in `celery_app.py`.
    command: ["celery", "-A", "celery_app:celery_app", "flower"]
    ports:
      - "5555:5555"
    env_file:
      - ./python-backend/.env
    depends_on:
      - redis
      - web

  sandbox-manager:
    build:
      context: .
      dockerfile: sandbox_manager/Dockerfile
    container_name: aios-sandbox-manager
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  redis_data: